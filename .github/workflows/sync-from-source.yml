name: 🔄 Sync Repositories

on:
  workflow_dispatch:  # Permite rodar manualmente pela aba Actions
  schedule:
    - cron: '0 */6 * * *'  # Ex: roda a cada 6h (ajuste conforme necessário)

permissions:
  contents: write  # Necessário para o bot fazer push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout do repositório destino
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 📦 Clonar repositório de origem
        run: git clone --depth 1 https://github.com/HunterTheCraft-OFICIAL/openttd-android-Mobile-Android-.git /tmp/source_repo

      - name: 🔄 Sincronizar arquivos (sem corromper .git)
        run: |
          # rsync é mais seguro que cp. --exclude='.git' evita sobrescrever o histórico
          rsync -av --delete --exclude='.git' /tmp/source_repo/ ./
          rm -rf /tmp/source_repo

      - name: 🔍 Verificar se há alterações
        id: git-check
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✅ Nenhuma alteração detectada."
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "🔄 Alterações detectadas!"
          fi

      - name: 💾 Commit e Push (só roda se houver mudanças)
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "🤖 Auto-sync: atualizado a partir do repositório de origem"
          git push origin ${{ github.ref_name }}
